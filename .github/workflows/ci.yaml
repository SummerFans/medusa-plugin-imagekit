name: ci
on: push

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
    
      - name: Install dependencies
        run: yarn
    
      - name: Build
        run: yarn run build
  release:
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    needs:
      - build
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install dependencies
        run: yarn

      - name: Build
        run: yarn run build

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          